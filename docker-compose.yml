services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      INTERNAL_TOOL_API_KEY: ${INTERNAL_TOOL_API_KEY:-demo-internal-tool-key}
      LLM_GROUNDED_FAQ_ENABLED: ${LLM_GROUNDED_FAQ_ENABLED:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      LLM_MODEL: ${LLM_MODEL:-gpt-5.6-luna}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DOCKER_MODEL_RUNNER_BASE_URL: ${COMPOSE_DOCKER_MODEL_RUNNER_BASE_URL:-http://host.docker.internal:12434/engines/v1}
      DOCKER_MODEL_RUNNER_MODEL: ${DOCKER_MODEL_RUNNER_MODEL:-ai/smollm2}
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    ports:
      - "8000:8000"

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      INTERNAL_TOOL_API_KEY: ${INTERNAL_TOOL_API_KEY:-demo-internal-tool-key}
      LLM_GROUNDED_FAQ_ENABLED: ${LLM_GROUNDED_FAQ_ENABLED:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      LLM_MODEL: ${LLM_MODEL:-gpt-5.6-luna}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DOCKER_MODEL_RUNNER_BASE_URL: ${COMPOSE_DOCKER_MODEL_RUNNER_BASE_URL:-http://host.docker.internal:12434/engines/v1}
      DOCKER_MODEL_RUNNER_MODEL: ${DOCKER_MODEL_RUNNER_MODEL:-ai/smollm2}
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 8600
    command:
      - python
      - -m
      - app.mcp.server
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    ports:
      - "8600:8600"

  customer-chat:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      INTERNAL_TOOL_API_KEY: ${INTERNAL_TOOL_API_KEY:-demo-internal-tool-key}
      DEFAULT_API_URL: http://api:8000/v1
    command:
      - streamlit
      - run
      - frontend/customer_chat.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8501"
    ports:
      - "8501:8501"
    depends_on:
      - api

  ops-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      INTERNAL_TOOL_API_KEY: ${INTERNAL_TOOL_API_KEY:-demo-internal-tool-key}
      DEFAULT_API_URL: http://api:8000/v1
    command:
      - streamlit
      - run
      - frontend/ops_dashboard.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8502"
    ports:
      - "8502:8502"
    depends_on:
      - api
